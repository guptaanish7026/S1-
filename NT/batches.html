<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch Details</title>
  <link rel="stylesheet" href="batches.css" />
  <!-- hls.js for HLS video support -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <!-- ========== LOADING OVERLAY ========== -->
  <div id="loader" class="loader-overlay">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <p>Initializing System...</p>
    </div>
  </div>

  <!-- ========== MAIN APP ========== -->
  <div id="app" class="app-container" style="display: none;">
    <!-- Header -->
    <header class="app-header glass">
      <h1 class="batch-title" id="batch-title">Loading...</h1>
      <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">
        🌓
      </button>
    </header>

    <!-- Hero Section -->
    <section class="hero glass" id="hero">
      <div class="hero-thumb">
        <img id="hero-thumbnail" src="" alt="Batch thumbnail" />
      </div>
      <div class="hero-info">
        <h2 id="hero-title"></h2>
        <span class="price" id="hero-price"></span>
      </div>
    </section>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      <button class="tab-btn" data-tab="study-material">Study Material</button>
    </div>

    <!-- Tab Content -->
    <div class="tab-content" id="tab-content">
      <!-- Overview Panel -->
      <div id="overview-panel" class="tab-panel active">
        <div class="description glass" id="description-container">
          <!-- description injected by JS -->
        </div>
      </div>

      <!-- Study Material Panel -->
      <div id="study-material-panel" class="tab-panel">
        <div class="study-layout">
          <!-- Subjects Sidebar -->
          <aside class="subjects-sidebar glass" id="subjects-sidebar">
            <h3>Subjects</h3>
            <ul id="subject-list"></ul>
          </aside>

          <!-- Folder / File Browser -->
          <main class="folder-view glass" id="folder-view">
            <div class="breadcrumb" id="breadcrumb"></div>
            <div class="file-grid" id="file-grid"></div>
          </main>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== VIDEO PLAYER MODAL ========== -->
  <div id="video-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content glass">
      <button class="modal-close" id="modal-close">&times;</button>
      <h2 id="modal-title" class="modal-video-title"></h2>
      <div class="video-container" id="video-container">
        <!-- player injected by videoPlayer.js -->
      </div>
    </div>
  </div>

  <script src="videoPlayer.js"></script>
  <script src="batches.js"></script>
</body>
</html>
